experiment_id: E5
kernel: sptrsv
description: "Sparse Triangular Solve — forward/backward substitution"
group: semi_irregular
source: "Kokkos-Kernels, RAJA SpTRSV implementations"
primary_metric: solve_time_ms
secondary_metric: throughput_gflops
solve_direction: [forward, backward]

matrix_variants:
  structured:
    description: "Lower triangular from structured 3D Laplacian"
  random:
    description: "Random lower triangular — worst-case level sets"
  circuit:
    description: "Circuit simulation matrix — deep dependency chains"

timing:
  warmup_iterations: 10
  timed_iterations: 30
  statistics: [median, iqr, min, max]
  outlier_threshold_sigma: 2.0

abstractions:
  - native
  - kokkos
  - raja
  - sycl
  - julia

platforms:
  - nvidia_rtx5060
  - amd_mi300x

platform_abstractions:
  nvidia_rtx5060: [native, kokkos, raja, julia]
  # numba: UNSUPPORTED_CC120; sycl: NO_COMPILER on RTX 5060
  amd_mi300x: [native, kokkos, raja, sycl, julia]
  # numba-hip experimental — not included

platform_notes:
  amd_mi300x:
    native: "sptrsv-hip binary (HIP port of CUDA kernel — identical kernel body)"
    sycl: "AdaptiveCpp (acpp) --acpp-targets=hip:gfx942; HSA dispatch overhead × n_levels expected to be significant — predict poor tier"
    julia: "JULIA_GPU_BACKEND=amdgpu; @roc launch overhead × n_levels — same concern as SYCL"

availability_notes:
  sycl: "Full level-set implementation via SYCL USM nd_range<1> + q.wait() per level"
  julia: "AMDGPU.jl @eval pattern for backend dispatch; fill!(d_x, 0.0) reset between reps"

notes:
  - "Sequential dependencies require level-set parallelism"
  - "Tests task-based abstractions' ability to expose parallelism in apparently sequential code"

correctness:
  tolerance: 1.0e-6
  reference: native

deep_profiling_trigger:
  overhead_threshold: 0.15
