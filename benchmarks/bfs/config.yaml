experiment_id: E6
kernel: bfs
description: "Breadth-First Search — level-synchronous graph traversal"
group: irregular
source: "Graph500 reference, GAP Benchmark Suite"
primary_metric: gteps
gteps_formula: "edges_traversed / time_seconds / 1e9"

graph_variants:
  rmat:
    description: "RMAT graph — power-law degree distribution (Graph500 standard)"
    scale: 22
    edge_factor: 16
  road:
    description: "Road network — low average degree, long diameter"
    dataset: "USA road network"
  random:
    description: "Erdos-Renyi random graph — worst-case load imbalance"
    n: 4194304   # 2^22 vertices
    m: 67108864  # 2^26 edges

timing:
  warmup_iterations: 10
  timed_iterations: 30
  statistics: [median, iqr, min, max]
  outlier_threshold_sigma: 2.0

abstractions:
  - native
  - kokkos
  - raja
  - sycl
  - julia

platforms:
  - nvidia_rtx5060
  - amd_mi300x

platform_abstractions:
  nvidia_rtx5060: [native, kokkos, raja, julia]
  amd_mi300x:     [native, kokkos, raja, sycl, julia]

availability_notes:
  sycl:
    nvidia_rtx5060: "SKIP — no SYCL compiler available on RTX 5060"
    amd_mi300x:     "AdaptiveCpp acpp --acpp-targets=hip:gfx942; predicted <25% efficiency on 2d_grid large (511 q.wait() HSA dispatches per BFS run)"
  julia: "Experimental — AMDGPU.jl @eval pattern for kernel launch dispatch"

platform_notes:
  amd_mi300x:
    native: "bfs-hip binary (HIP port of CUDA kernel; hipcc --offload-arch=gfx942)"
    sycl:   "AdaptiveCpp acpp --acpp-targets=hip:gfx942; atomic_ref compact avoids DPL dependency; n_levels q.wait() calls dominate runtime on 2d_grid"

notes:
  - "Limits test — expected to show abstraction failure modes"
  - "Irregular memory access, extreme load imbalance, control flow divergence, atomics"
  - "Feeds taxonomy irregular patterns category"
  - "SYCL HSA dispatch overhead × n_levels is primary bottleneck on AMD (P001 pattern)"

correctness:
  tolerance: 0     # BFS result is exact — vertex counts must match exactly
  reference: native

deep_profiling_trigger:
  overhead_threshold: 0.15
