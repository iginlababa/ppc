[pytest]
testpaths = tests
addopts   = --tb=short -q

markers =
    e1: E1 STREAM Triad experiment
    e2: E2 DGEMM experiment
    e3: E3 Stencil experiment
    correctness: Correctness gate — must pass before any timing run is accepted
    slow: Tests that take > 30 seconds (e.g. large-array runs)
    gpu: Tests that require a GPU (skipped on CPU-only nodes)
